name: Extract MyTreeGrove ZIP

on:
  push:
    paths:
      - 'demo-main.zip'

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Extract ZIP file
        run: |
          unzip demo-main.zip -d temp/
          rm demo-main.zip
          mv temp/* ./
          rm -rf temp/

      - name: Commit and push changes
        run: |
          git config --global user.name 'Sajidulahmed'
          git config --global user.email 'sajidulahmed@users.noreply.github.com'
          git add .
          git commit -m 'Extract demo-main.zip'
          git push
